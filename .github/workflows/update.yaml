name: Update manifest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for updates
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        with:
          args: --edit-only flatpak-flutter.yaml

      - name: Check diff
        id: diff
        continue-on-error: true
        run: git diff --exit-code

      - name: Remove outdated dependencies
        if: steps.diff.outcome == 'failure'
        run: rm -rf generated

      - name: Get Aria version
        id: get-aria-version
        if: steps.diff.outcome == 'failure'
        run: |
          tag=$(yq .modules[0].sources[0].tag flatpak-flutter.yaml)
          echo version=${tag:1} >> $GITHUB_OUTPUT

      - name: Checkout Aria
        if: steps.diff.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: poppingmoon/aria
          ref: v${{ steps.get-aria-version.outputs.version }}
          path: aria
          persist-credentials: false

      - name: Update Flutter version
        if: steps.diff.outcome == 'failure'
        run: |
          version=$(grep flutter aria/.fvmrc | cut -d ":" -f 2 | cut -d "\"" -f 2)
          yq -i ".modules[0].sources[1].tag=\"$version\"" flatpak-flutter.yaml

      - name: Remove Aria
        if: steps.diff.outcome == 'failure'
        run: rm -rf aria

      - name: Update Rust version
        if: steps.diff.outcome == 'failure'
        run: |
          version=$(rustc --version | cut -d " " -f 2)
          yq -i ".modules[0].modules[0]=\"generated/modules/rustup-$version.json\"" flatpak-flutter.yaml

      - name: Generate manifest
        if: steps.diff.outcome == 'failure'
        run: >
          docker run --rm -v "$PWD":/usr/src/flatpak -u `id -u`:`id -g`
          theappgineer/flatpak-flutter:latest flatpak-flutter.yaml

      - name: Change owner of generated files
        if: steps.diff.outcome == 'failure'
        run: sudo chown -R $(whoami) generated

      - name: Create Pull Request
        if: steps.diff.outcome == 'failure'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: Update Aria to ${{ steps.get-aria-version.outputs.version }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: Update Aria to ${{ steps.get-aria-version.outputs.version }}
