id: com.poppingmoon.aria
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: aria
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
modules:
  - name: aria
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/var/lib/rustup/bin:/run/build/aria/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/aria/.pub-cache
        CARGO_HOME: /run/build/aria/cargo
        RUSTUP_HOME: /var/lib/rustup
    build-commands:
      - flutter build linux --no-pub
      - install -D $BUNDLE_PATH/aria /app/bin/aria
      - cp -r $BUNDLE_PATH/lib /app/bin/lib
      - cp -r $BUNDLE_PATH/data /app/bin/data
      - install -Dm644 flatpak/com.poppingmoon.aria.desktop -t /app/share/applications
      - install -Dm644 flatpak/com.poppingmoon.aria.metainfo.xml -t /app/share/metainfo
      - install -Dm644 flatpak/com.poppingmoon.aria.png -t /app/share/icons/hicolor/512x512/apps
    sources:
      - type: git
        url: https://github.com/poppingmoon/aria.git
        tag: v1.4.4
        commit: 1c822c6f5c1bdf9598481b93270faafdcc31e8bf
        disable-submodules: true
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.41.4
        dest: flutter
    modules:
      - generated/modules/rustup-1.93.1.json
